name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      version:
        description: "Release version to validate against pyproject.toml and CHANGELOG.md (for example 0.2.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Normalize release version input
        id: normalize_version
        shell: bash
        run: |
          RAW="${{ github.event.inputs.version }}"
          VERSION="${RAW#v}"
          VERSION="${VERSION#V}"
          if [ -z "$VERSION" ]; then
            echo "Normalized version is empty. Input was '$RAW'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using normalized version: $VERSION"

      - name: Release gate (version and changelog entry)
        shell: pwsh
        run: |
          ./scripts/check-changelog-entry.ps1 -ProjectPath . -Version "${{ steps.normalize_version.outputs.version }}"

      - name: Release gate (PyPI tag/version enforcement)
        if: ${{ github.event.inputs.repository == 'pypi' }}
        shell: pwsh
        run: |
          $version = "${{ steps.normalize_version.outputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "PyPI publish requires explicit 'version' workflow input."
          }

          $tag = "v$version"
          $headSha = (git rev-parse HEAD).Trim()
          $tagSha = (git rev-list -n 1 $tag).Trim()

          if (-not $tagSha) {
            throw "Required tag '$tag' was not found in the repository."
          }

          if ($headSha -ne $tagSha) {
            throw "PyPI publish must run from commit tagged '$tag'. HEAD=$headSha TAG=$tagSha"
          }

          Write-Host "PyPI guard passed: tag '$tag' matches current commit."

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Build artifacts
        run: |
          uv run python -m build

      - name: Verify artifact version in filenames
        shell: bash
        run: |
          VERSION="${{ steps.normalize_version.outputs.version }}"
          test -f "dist/parol_pygen-${VERSION}.tar.gz"

          shopt -s nullglob
          wheels=(dist/parol_pygen-"${VERSION}"-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "Missing wheel artifact for version ${VERSION}"
            exit 1
          fi
          echo "Artifact version check passed for ${VERSION}"

      - name: Verify artifacts
        run: |
          uv run python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish-testpypi:
    if: ${{ github.event.inputs.repository == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
      url: https://test.pypi.org/p/parol-pygen
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

  publish-pypi:
    if: ${{ github.event.inputs.repository == 'pypi' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/parol-pygen
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
