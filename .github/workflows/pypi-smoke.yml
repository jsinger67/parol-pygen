name: PyPI Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test from PyPI"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install from PyPI
        run: |
          python -m pip install --upgrade pip
          python -m pip install "parol-pygen==${{ github.event.inputs.version }}"

      - name: Smoke CLI commands
        run: |
          parol-pygen --version
          python -m parol_pygen.cli info

      - name: Smoke scaffold command
        run: |
          python -m parol_pygen.cli init --out ./_smoke --project smoke --package smoke_generated
          test -f ./_smoke/README.md
          test -f ./_smoke/proof_runner.py
          test -f ./_smoke/custom_actions.py
