name: PyPI Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test from PyPI"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Create isolated venv
        run: |
          uv venv .venv

      - name: Install from PyPI
        run: |
          uv pip install --python .venv/bin/python "parol-pygen==${{ github.event.inputs.version }}"

      - name: Smoke CLI commands
        run: |
          OUT=$(.venv/bin/parol-pygen --version)
          echo "$OUT"
          if [[ "$OUT" != *"${{ github.event.inputs.version }}"* ]]; then
            echo "Expected installed CLI version to contain '${{ github.event.inputs.version }}'"
            exit 1
          fi
          .venv/bin/python - <<'PY'
          import json
          import subprocess

          expected_version = "${{ github.event.inputs.version }}"
          cp = subprocess.run(
            [".venv/bin/python", "-m", "parol_pygen.cli", "info"],
            capture_output=True,
            text=True,
            check=True,
          )
          info = json.loads(cp.stdout)

          if info.get("name") != "parol-pygen":
            raise SystemExit(f"Unexpected package name in info payload: {info.get('name')!r}")
          if info.get("version") != expected_version:
            raise SystemExit(
              f"Expected info version {expected_version!r}, got {info.get('version')!r}"
            )

          print("info payload validated")
          PY

      - name: Smoke scaffold command
        run: |
          .venv/bin/python -m parol_pygen.cli init --out ./_smoke --project smoke --package smoke_generated
          test -f ./_smoke/README.md
          test -f ./_smoke/proof_runner.py
          test -f ./_smoke/custom_actions.py
