name: TestPyPI Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test from TestPyPI"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install from TestPyPI
        run: |
          uv pip install --system --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "parol-pygen==${{ github.event.inputs.version }}"

      - name: Smoke CLI commands
        run: |
          parol-pygen --version
          python -m parol_pygen.cli info

      - name: Smoke scaffold command
        run: |
          python -m parol_pygen.cli init --out ./_smoke --project smoke --package smoke_generated
          test -f ./_smoke/README.md
          test -f ./_smoke/proof_runner.py
          test -f ./_smoke/custom_actions.py
