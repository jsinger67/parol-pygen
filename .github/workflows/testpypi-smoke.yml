name: TestPyPI Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test from TestPyPI"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Create isolated venv
        run: |
          uv venv .venv

      - name: Verify requested version is on TestPyPI
        run: |
          .venv/bin/python - <<'PY'
          import re
          import urllib.request

          requested = "${{ github.event.inputs.version }}"
          url = "https://test.pypi.org/simple/parol-pygen/"

          try:
            with urllib.request.urlopen(url, timeout=30) as response:
              html = response.read().decode("utf-8", errors="replace")
          except Exception as exc:
            raise SystemExit(f"Unable to query TestPyPI index at {url}: {exc}")

          versions = sorted(set(re.findall(r"parol_pygen-([0-9][^\"< ]+?)(?:-py3-none-any\.whl|\.tar\.gz)", html)))

          if requested not in versions:
            available = ", ".join(versions) if versions else "<none>"
            raise SystemExit(
              "Requested version is not available on TestPyPI yet. "
              f"requested={requested}, available={available}"
            )

          print(f"Requested version {requested} is available on TestPyPI")
          PY

      - name: Install from TestPyPI
        run: |
          for attempt in 1 2 3 4 5; do
            if uv pip install --python .venv/bin/python --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ --index-strategy unsafe-best-match "parol-pygen==${{ github.event.inputs.version }}"; then
              echo "Install succeeded on attempt $attempt"
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Install failed after $attempt attempts"
              exit 1
            fi

            echo "Install attempt $attempt failed; waiting for index propagation..."
            sleep 20
          done

      - name: Smoke CLI commands
        run: |
          OUT=$(.venv/bin/parol-pygen --version)
          echo "$OUT"
          if [[ "$OUT" != *"${{ github.event.inputs.version }}"* ]]; then
            echo "Expected installed CLI version to contain '${{ github.event.inputs.version }}'"
            exit 1
          fi
          .venv/bin/python - <<'PY'
          import json
          import subprocess

          expected_version = "${{ github.event.inputs.version }}"
          cp = subprocess.run(
            [".venv/bin/python", "-m", "parol_pygen.cli", "info"],
            capture_output=True,
            text=True,
            check=True,
          )
          info = json.loads(cp.stdout)

          if info.get("name") != "parol-pygen":
            raise SystemExit(f"Unexpected package name in info payload: {info.get('name')!r}")
          if info.get("version") != expected_version:
            raise SystemExit(
              f"Expected info version {expected_version!r}, got {info.get('version')!r}"
            )

          print("info payload validated")
          PY

      - name: Smoke scaffold command
        run: |
          .venv/bin/python -m parol_pygen.cli init --out ./_smoke --project smoke --package smoke_generated
          test -f ./_smoke/README.md
          test -f ./_smoke/proof_runner.py
          test -f ./_smoke/custom_actions.py
